<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TUDU • Stay Organized</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-page">
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-tasks fa-2x mb-3"></i>
        <marquee behavior="" direction=""><h1 class="fw-bold fs-2">TUDU</h1></marquee>
        <p class="mb-0">Master your day, one task at a time</p>
      </div>

      <div class="login-body">
        <h5 class="mb-4 text-center">Welcome Back</h5>
        
        <div class="mb-3">
          <label class="form-label small">Email or Username</label>
          <input type="text" id="loginEmail" class="form-control" value="demo@flowtask.com">
        </div>

        <div class="mb-4">
          <label class="form-label small">Password</label>
          <input type="password" id="loginPassword" class="form-control" value="demo123">
        </div>

        <button onclick="handleLogin()" class="btn btn-primary w-100 py-3 fw-semibold">
          <i class="fas fa-sign-in-alt me-2"></i> Sign In
        </button>

        <div class="text-center mt-4">
          <small class="text-white">
            Demo: <strong>demo@flowtask.com</strong> / <strong>demo123</strong>
          </small>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appScreen" class="app-container d-none">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark shadow-sm sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold fs-3 d-flex align-items-center" href="#">
          <i class="fas fa-tasks me-2 "></i> TUDU
        </a>

        <div class="d-flex align-items-center gap-3">
          <div onclick="showProfileModal()" class="d-flex align-items-center gap-2 text-white" style="cursor: pointer;">
            <img id="navProfileImg" src="" alt="Profile" class="rounded-circle" width="42" height="42" style="object-fit: cover; border: 2px solid #00d4ff;">
            <span id="welcomeUser" class="fw-semibold fs-5"></span>
          </div>
          <button onclick="logout()" class="btn btn-outline-light rounded-pill px-4">
            <i class="fas fa-sign-out-alt me-1"></i> Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container py-5">

      <!-- Add New Task -->
      <div class="add-task-card mb-5">
        <h5 class="mb-3"><i class="fas fa-plus-circle me-2"></i>Add New Task</h5>
        <div class="row g-3">
          <div class="col-md-6">
            <input type="text" id="taskTitle" class="form-control" placeholder="What needs to be done?">
          </div>
          <div class="col-md-4">
            <textarea id="taskDesc" class="form-control" rows="1" placeholder="Optional description"></textarea>
          </div>
          <div class="col-md-2">
            <button onclick="addTask()" class="btn btn-primary w-100 h-100 fw-semibold">Add Task</button>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 text-white">My Tasks</h4>
        <div class="btn-group">
          <button onclick="setFilter('all')" id="filter-all" class="btn btn-outline-light active">All</button>
          <button onclick="setFilter('pending')" id="filter-pending" class="btn btn-outline-light">Pending</button>
          <button onclick="setFilter('completed')" id="filter-completed" class="btn btn-outline-light">Completed</button>
        </div>
      </div>

      <div id="tasksContainer" class="row g-4"></div>

      <div id="emptyState" class="empty-state text-center d-none">
        <i class="fas fa-check-circle fa-5x mb-4 text-success"></i>
        <h3>All Caught Up!</h3>
        <p class=" text-white ">No tasks in this section.<br>Add new tasks or switch tabs.</p>
      </div>
    </div>
  </div>

  <!-- Edit Task Modal -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-black fw-bold">Edit Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId">
          <div class="mb-3">
            <label class="form-label text-black fw-bold">Task Title</label>
            <input type="text" id="editTitle" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label text-black fw-bold">Description</label>
            <textarea id="editDesc" class="form-control" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button onclick="saveEditedTask()" class="btn btn-primary">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Profile Edit Modal -->
  <div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-black fw-bold">Edit Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center">
          <div class="mb-4">
            <img id="modalProfileImg" src="" alt="Profile" class="rounded-circle mb-3" width="120" height="120" style="object-fit: cover; border: 4px solid #00d4ff;">
            <div>
              <input type="file" id="profileImageInput" accept="image/*" class="form-control d-none" onchange="previewProfileImage(event)">
              <button onclick="document.getElementById('profileImageInput').click()" class="btn btn-outline-light btn-sm">
                <p class="text-black fw-bold ">Change Profile Picture</p>
              </button>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-black fw-bold">Your Name</label>
            <input type="text" id="profileName" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button onclick="saveProfile()" class="btn btn-primary">Save Profile</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
